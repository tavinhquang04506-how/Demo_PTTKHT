<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soát Vé - Nhân Viên - CineTicket</title>
  <link rel="stylesheet" href="../css/style.css">`n  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
  <nav id="navbar"></nav>
  <main class="page">
    <div class="container">
      <div class="page-header">
        <h1 class="page-title">🎫 Soát Vé</h1>
        <p class="page-subtitle">Quét mã QR hoặc nhập mã đặt vé để xác nhận</p>
      </div>

      <div class="scan-container">
        <!-- Tab chọn cách soát -->
        <div class="staff-tabs">
          <button class="staff-tab staff-tab-qr active" onclick="switchTab('camera',this)">📷 Quét QR</button>
          <button class="staff-tab staff-tab-manual" onclick="switchTab('manual',this)">⌨️ Nhập mã</button>
        </div>

        <!-- Camera QR -->
        <div class="tab-content active" id="tab-camera">
          <div id="qr-reader" style="margin-bottom:16px;"></div>
          <button class="btn btn-primary btn-full btn-lg" id="startScan" onclick="startScanner()">📷 Bắt đầu quét</button>
          <button class="btn btn-secondary btn-full" id="stopScan" style="display:none;margin-top:8px;" onclick="stopScanner()">⏹ Dừng quét</button>
        </div>

        <!-- Manual input -->
        <div class="tab-content" id="tab-manual">
          <div class="scan-input-section">
            <div class="scan-input-label">Nhập mã đặt vé</div>
            <div class="manual-input">
              <input type="text" class="form-input" id="manualCode" placeholder="VD: BK260327ABCD" onkeyup="if(event.key==='Enter')checkTicket(this.value)">
              <button class="btn btn-primary" onclick="checkTicket(document.getElementById('manualCode').value)">Kiểm tra</button>
            </div>
          </div>
        </div>

        <!-- Kết quả -->
        <div id="scanResult"></div>
      </div>

      <!-- Danh sách vé hôm nay -->
      <div class="section" style="margin-top:48px;">
        <h2 class="section-title">📋 🎫 Vé hôm nay</h2>
        <div id="todayTickets"><div class="loading"><div class="spinner"></div></div></div>
      </div>
    </div>
  </main>
  <footer id="footer"></footer>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    if (!Auth.requireLogin()) throw 'err';
    const role = Auth.getRole();
    if (role !== 'nhan_vien' && role !== 'quan_ly') {
      alert('Chỉ nhân viên mới được truy cập');
      window.location.href = '/';
      throw 'err';
    }

    let scanner = null;

    function switchTab(tab, btn) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.staff-tab').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      btn.classList.add('active');
      if (tab !== 'camera' && scanner) stopScanner();
    }

    function startScanner() {
      document.getElementById('startScan').style.display = 'none';
      document.getElementById('stopScan').style.display = 'block';
      scanner = new Html5Qrcode('qr-reader');
      scanner.start(
        { facingMode: 'environment' },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        (decoded) => {
          stopScanner();
          checkTicket(decoded);
        },
        () => {}
      ).catch(err => {
        showToast('Không thể mở camera: ' + err, 'error');
        document.getElementById('startScan').style.display = 'block';
        document.getElementById('stopScan').style.display = 'none';
      });
    }

    function stopScanner() {
      if (scanner) {
        scanner.stop().then(() => {
          scanner.clear();
          document.getElementById('startScan').style.display = 'block';
          document.getElementById('stopScan').style.display = 'none';
        }).catch(() => {});
      }
    }

    async function checkTicket(code) {
      code = code.trim().toUpperCase();
      if (!code) return;
      const result = document.getElementById('scanResult');
      result.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

      const { data: ticket } = await db
        .from('dat_ve')
        .select('*, nguoi_dung(ho_ten), suat_chieu(*, phim(ten_phim), phong_chieu(ten_phong, rap(ten_rap))), chi_tiet_ve(ghe(hang_ghe, so_ghe))')
        .eq('ma_dat_ve', code)
        .single();

      if (!ticket) {
        result.innerHTML = `<div class="scan-result invalid">
          <div class="scan-result-header" style="color:var(--danger);">❌ Không tìm thấy vé</div>
          <p class="text-muted">Mã "${code}" không tồn tại trong hệ thống</p>
        </div>`;
        return;
      }

      const gheList = ticket.chi_tiet_ve.map(c => `${c.ghe.hang_ghe}${c.ghe.so_ghe}`).join(', ');
      const sc = ticket.suat_chieu;
      const statusInfo = TRANG_THAI_VE[ticket.trang_thai];
      const isValid = ticket.trang_thai === 'da_thanh_toan';

      result.innerHTML = `<div class="scan-result ${isValid ? 'valid' : 'invalid'}">
        <div class="scan-result-header" style="color:${isValid ? 'var(--success)' : 'var(--danger)'};">${isValid ? '✅ Vé hợp lệ' : '❌ Vé không hợp lệ'}</div>
        <div class="scan-result-grid">
          <div>
            <div class="scan-result-item-label">Phim</div>
            <div class="scan-result-item-value">${sc.phim.ten_phim}</div>
          </div>
          <div>
            <div class="scan-result-item-label">Khách hàng</div>
            <div class="scan-result-item-value">${ticket.nguoi_dung.ho_ten}</div>
          </div>
          <div>
            <div class="scan-result-item-label">Ghế</div>
            <div class="scan-result-item-value" style="color:var(--secondary);font-weight:800;">${gheList}</div>
          </div>
          <div>
            <div class="scan-result-item-label">Giờ chiếu</div>
            <div class="scan-result-item-value">🕐 ${FORMAT_GIO(sc.gio_bat_dau)}</div>
          </div>
        </div>
        <div class="scan-result-footer">
          <div>
            <span class="status-badge status-${ticket.trang_thai}">${statusInfo.ten}</span>
            <span class="text-muted" style="margin-left:8px;font-size:0.8rem;">Mã: ${code}</span>
          </div>
          ${isValid ? `<button class="btn btn-success btn-lg" onclick="confirmCheckin('${code}', ${ticket.id})">🎫 Xác nhận sử dụng</button>` :
            ticket.trang_thai === 'da_su_dung' ? '<span style="color:var(--warning);">⚠️ Đã sử dụng</span>' :
            '<span style="color:var(--danger);">⚠️ Không hợp lệ</span>'}
        </div>
      </div>`;
    }

    async function confirmCheckin(code, id) {
      await db.from('dat_ve').update({ trang_thai: 'da_su_dung' }).eq('id', id);
      showToast('Soát vé thành công!', 'success');
      checkTicket(code);
      loadTodayTickets();
    }

    async function loadTodayTickets() {
      const today = new Date().toISOString().split('T')[0];
      const { data } = await db
        .from('dat_ve')
        .select('*, suat_chieu(ngay_chieu, gio_bat_dau, phim(ten_phim), phong_chieu(ten_phong, rap(ten_rap))), nguoi_dung(ho_ten), chi_tiet_ve(ghe(hang_ghe,so_ghe))')
        .in('trang_thai', ['da_thanh_toan', 'da_su_dung'])
        .order('created_at', { ascending: false })
        .limit(50);

      const todayData = (data||[]).filter(d => d.suat_chieu.ngay_chieu === today);
      const container = document.getElementById('todayTickets');
      if (!todayData.length) {
        container.innerHTML = '<div class="empty-state"><span class="icon">📋</span><p>Chưa có vé nào hôm nay</p></div>';
        return;
      }
      container.innerHTML = `<div style="overflow-x:auto;"><table class="data-table">
        <thead><tr><th>Mã vé</th><th>Khách hàng</th><th>Phim</th><th>Giờ</th><th>Ghế</th><th>Trạng thái</th></tr></thead>
        <tbody>${todayData.map(d => `<tr style="cursor:pointer;" onclick="checkTicket('${d.ma_dat_ve}')">
          <td style="color:var(--accent);font-weight:700;">${d.ma_dat_ve}</td>
          <td><strong>${d.nguoi_dung.ho_ten}</strong></td>
          <td>${d.suat_chieu.phim.ten_phim}</td>
          <td>${FORMAT_GIO(d.suat_chieu.gio_bat_dau)}</td>
          <td style="color:var(--secondary);font-weight:700;">${d.chi_tiet_ve.map(c=>`${c.ghe.hang_ghe}${c.ghe.so_ghe}`).join(', ')}</td>
          <td><span class="status-badge status-${d.trang_thai}">${TRANG_THAI_VE[d.trang_thai].ten}</span></td>
        </tr>`).join('')}</tbody>
      </table></div>`;
    }

    loadTodayTickets();
  </script>
</body>
</html>
