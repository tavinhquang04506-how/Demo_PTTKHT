<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thông Tin Cá Nhân - CineTicket</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
</head>
<body>
  <nav id="navbar"></nav>
  <main class="page">
    <div class="container" style="max-width:600px;">
      <div class="subpage-header">
        <a href="/pages/tai-khoan" class="subpage-back">← Quay lại</a>
        <h1 class="page-title">👤 Thông Tin Cá Nhân</h1>
        <p class="subpage-desc">Cập nhật thông tin tài khoản của bạn</p>
      </div>

      <!-- Avatar -->
      <div class="profile-avatar-section" style="padding-bottom:8px;">
        <div class="profile-avatar" id="profileAvatar">?</div>
        <button class="btn btn-outline" style="font-size:0.8rem; padding:8px 20px;" onclick="alert('Tính năng đang phát triển!')">📷 Đổi ảnh đại diện</button>
      </div>

      <!-- Form -->
      <div class="subpage-section">
        <form onsubmit="updateProfile(event)" class="profile-form-card">
          <div class="form-group">
            <label class="form-label">Họ và tên</label>
            <input type="text" class="form-input" id="hoTen" required>
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="email" disabled style="opacity:0.6;">
            <small style="color:var(--text-muted); font-size:0.78rem;">Email không thể thay đổi</small>
          </div>
          <div class="form-group">
            <label class="form-label">Số điện thoại</label>
            <input type="tel" class="form-input" id="sdt" placeholder="Nhập số điện thoại">
          </div>
          <div class="form-group">
            <label class="form-label">Ngày sinh</label>
            <input type="date" class="form-input" id="ngaySinh">
          </div>
          <div class="form-group">
            <label class="form-label">Giới tính</label>
            <select class="form-input" id="gioiTinh">
              <option value="">-- Chọn --</option>
              <option value="nam">Nam</option>
              <option value="nu">Nữ</option>
              <option value="khac">Khác</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary btn-full btn-lg">Lưu thay đổi</button>
        </form>
      </div>

      <!-- Change Password -->
      <div class="subpage-section">
        <div class="subpage-section-header">
          <h3>Đổi mật khẩu</h3>
        </div>
        <div class="profile-form-card">
          <div class="form-group">
            <label class="form-label">Mật khẩu hiện tại</label>
            <input type="password" class="form-input" placeholder="••••••">
          </div>
          <div class="form-group">
            <label class="form-label">Mật khẩu mới</label>
            <input type="password" class="form-input" placeholder="••••••">
          </div>
          <div class="form-group">
            <label class="form-label">Xác nhận mật khẩu mới</label>
            <input type="password" class="form-input" placeholder="••••••">
          </div>
          <button type="button" class="btn btn-outline btn-full" onclick="alert('Tính năng đang phát triển!')">Đổi mật khẩu</button>
        </div>
      </div>

      <!-- Delete Account -->
      <div class="subpage-section" style="margin-bottom:32px;">
        <button class="btn btn-full" style="background:rgba(233,69,96,0.1); color:var(--accent); border:1px solid rgba(233,69,96,0.3);" onclick="alert('Tính năng đang phát triển!')">
          🗑️ Xóa tài khoản
        </button>
        <p style="text-align:center; font-size:0.78rem; color:var(--text-muted); margin-top:8px;">Hành động này không thể hoàn tác</p>
      </div>
    </div>
  </main>
  <footer id="footer"></footer>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    if (!Auth.requireLogin()) throw 'err';
    const user = Auth.getUser();

    const names = user.ho_ten.split(' ');
    const initials = names.length >= 2
      ? (names[0].charAt(0) + names[names.length - 1].charAt(0)).toUpperCase()
      : user.ho_ten.charAt(0).toUpperCase();
    document.getElementById('profileAvatar').textContent = initials;
    document.getElementById('hoTen').value = user.ho_ten;
    document.getElementById('email').value = user.email;
    document.getElementById('sdt').value = user.so_dien_thoai || '';

    async function updateProfile(e) {
      e.preventDefault();
      const { error } = await db.from('nguoi_dung').update({
        ho_ten: document.getElementById('hoTen').value,
        so_dien_thoai: document.getElementById('sdt').value
      }).eq('id', user.id);
      if (error) { showToast('Lỗi cập nhật', 'error'); return; }
      user.ho_ten = document.getElementById('hoTen').value;
      user.so_dien_thoai = document.getElementById('sdt').value;
      localStorage.setItem('currentUser', JSON.stringify(user));
      showToast('Cập nhật thành công!', 'success');
    }
  </script>
</body>
</html>
