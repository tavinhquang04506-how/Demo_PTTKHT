<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Nhập - CineTicket</title>
  <link rel="stylesheet" href="../css/style.css">`n  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
</head>
<body>
  <nav id="navbar"></nav>
  <main class="page">
    <div class="container">
      <div class="auth-container">
        <h1>🔐 Đăng Nhập</h1>
        <p class="subtitle">Đăng nhập để đặt vé và quản lý tài khoản</p>

        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label class="form-label">📧 Email</label>
            <input type="email" class="form-input" id="email" placeholder="your@email.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">🔒 Mật khẩu</label>
            <input type="password" class="form-input" id="password" placeholder="••••••" required>
          </div>
          <div style="text-align: right; margin-bottom: 16px;">
            <a href="#" style="color: var(--text-muted); font-size: 0.85rem;">Quên mật khẩu?</a>
          </div>
          <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">Đăng nhập</button>
        </form>

        <div class="auth-divider">HOẶC</div>

        <div class="social-login-buttons">
          <button class="social-btn social-btn-google" onclick="alert('Tính năng đăng nhập Google đang phát triển!')">
            <svg class="social-icon" viewBox="0 0 24 24" width="20" height="20">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            <span>Đăng nhập với Google</span>
          </button>
          <button class="social-btn social-btn-facebook" onclick="alert('Tính năng đăng nhập Facebook đang phát triển!')">
            <svg class="social-icon" viewBox="0 0 24 24" width="20" height="20">
              <path fill="currentColor" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
            </svg>
            <span>Đăng nhập với Facebook</span>
          </button>
        </div>

        <div class="auth-footer">
          Chưa có tài khoản? <a href="/pages/dang-ky"><strong>Đăng ký ngay</strong></a>
        </div>

        <!-- Demo accounts - tạm ẩn -->
        <div style="display:none">
          <div class="auth-divider">Tài khoản demo</div>
          <div>
            <button class="demo-btn" onclick="quickLogin('khach1@demo.com')">
              <span><span class="demo-icon">👤</span> Khách hàng 1 - khach1@demo.com</span>
              <span class="demo-arrow">›</span>
            </button>
            <button class="demo-btn" onclick="quickLogin('khach2@demo.com')">
              <span><span class="demo-icon">👤</span> Khách hàng 2 - khach2@demo.com</span>
              <span class="demo-arrow">›</span>
            </button>
            <button class="demo-btn" onclick="quickLogin('khach3@demo.com')">
              <span><span class="demo-icon">👤</span> Khách hàng 3 - khach3@demo.com</span>
              <span class="demo-arrow">›</span>
            </button>
            <button class="demo-btn" onclick="quickLogin('nhanvien@demo.com')">
              <span><span class="demo-icon">🎫</span> Nhân viên - nhanvien@demo.com</span>
              <span class="demo-arrow">›</span>
            </button>
            <button class="demo-btn manager-btn" onclick="quickLogin('quanly@demo.com')">
              <span><span class="demo-icon">⭐</span> Quản lý - quanly@demo.com</span>
              <span class="demo-arrow">›</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>
  <footer id="footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    if (Auth.isLoggedIn()) Auth.redirectByRole();

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'Đang đăng nhập...';
      try {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        await Auth.login(email, password);
        showToast('Đăng nhập thành công!', 'success');
        setTimeout(() => Auth.redirectByRole(), 500);
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Đăng nhập';
      }
    }

    async function quickLogin(email) {
      document.getElementById('email').value = email;
      document.getElementById('password').value = '123456';
      try {
        await Auth.login(email, '123456');
        showToast('Đăng nhập thành công!', 'success');
        setTimeout(() => Auth.redirectByRole(), 500);
      } catch (err) {
        showToast(err.message, 'error');
      }
    }
  </script>
</body>
</html>
