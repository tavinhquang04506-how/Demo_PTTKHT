<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lịch Sử Đặt Vé - CineTicket</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">

</head>
<body>
  <nav id="navbar"></nav>
  <main class="page">
    <div class="container">
      <div class="page-header">
        <h1 class="page-title">📋 Lịch Sử Đặt Vé</h1>
        <p class="page-subtitle">Theo dõi và quản lý các giao dịch đặt vé của bạn.</p>
      </div>
      <div id="historyList"><div class="loading"><div class="spinner"></div><p>Đang tải...</p></div></div>
    </div>
  </main>
  <footer id="footer"></footer>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    if (!Auth.requireLogin()) throw 'err';

    async function loadHistory() {
      const user = Auth.getUser();
      const { data } = await db
        .from('dat_ve')
        .select('*, suat_chieu(*, phim(*), phong_chieu(*, rap(*))), chi_tiet_ve(ghe(*)), chi_tiet_combo(combo(*), so_luong, thanh_tien)')
        .eq('nguoi_dung_id', user.id)
        .order('created_at', { ascending: false });

      const container = document.getElementById('historyList');
      if (!data || !data.length) {
        container.innerHTML = '<div class="empty-state"><span class="icon">🎬</span><p>Bạn chưa có đơn đặt vé nào</p><a href="/" class="btn btn-primary" style="margin-top:16px;">Đặt vé ngay</a></div>';
        return;
      }

      container.innerHTML = data.map(d => {
        const sc = d.suat_chieu;
        const gheList = d.chi_tiet_ve.map(c => `${c.ghe.hang_ghe}${c.ghe.so_ghe}`).join(', ');
        const statusInfo = TRANG_THAI_VE[d.trang_thai] || { ten: d.trang_thai, mau: '#718096' };
        const qrInfo = JSON.stringify({
          code: d.ma_dat_ve,
          phim: sc.phim.ten_phim,
          rap: sc.phong_chieu.rap.ten_rap + ' - ' + sc.phong_chieu.ten_phong,
          ngay: sc.ngay_chieu,
          gio: sc.gio_bat_dau,
          ghe: gheList,
          tong: d.tong_tien
        }).replace(/'/g, "\\'");
        return `
        <div class="history-card">
          <img src="${sc.phim.poster_url}" alt="${sc.phim.ten_phim}" class="history-poster" onerror="posterFallback(this)">
          <div class="history-info">
            <div class="history-movie-title">${sc.phim.ten_phim}</div>
            <div class="history-detail">📍 ${sc.phong_chieu.rap.ten_rap} · ${sc.phong_chieu.ten_phong}</div>
            <div class="history-detail">📅 ${FORMAT_NGAY(sc.ngay_chieu)} · ${FORMAT_GIO(sc.gio_bat_dau)}</div>
            <div class="history-detail">🪑 Ghế: <strong>${gheList}</strong></div>
            <div class="history-price">💰 ${FORMAT_TIEN(d.tong_tien)}</div>
          </div>
          <div class="history-right">
            <span class="status-badge status-${d.trang_thai}">● ${statusInfo.ten}</span>
            <div class="history-code">${d.ma_dat_ve}</div>
            ${d.trang_thai === 'da_thanh_toan' ? `<button class="btn btn-outline btn-sm" style="margin-top:12px;" onclick="showQR('${qrInfo}')">📱 Xem QR</button>` : ''}
          </div>
        </div>`;
      }).join('');
    }

    function showQR(infoStr) {
      let info;
      try { info = JSON.parse(infoStr); } catch(e) { info = { code: infoStr }; }
      
      const qrText = `CINETICKET|${info.code}|${info.phim||''}|${info.rap||''}|${info.ngay||''}|${info.ghe||''}|${info.tong||0}`;
      const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(qrText)}&bgcolor=ffffff&color=1a1a2e`;

      const modal = document.createElement('div');
      modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(8px);';
      modal.onclick = () => modal.remove();
      modal.innerHTML = `<div style="background:var(--surface-container);padding:32px;border-radius:var(--radius-lg);text-align:center;border:1px solid rgba(90,64,66,0.1);max-width:340px;width:90%;" onclick="event.stopPropagation()">
        <h3 style="margin-bottom:4px;">🎬 Mã QR Vé</h3>
        <p style="margin-bottom:4px; font-size:0.85rem; color:var(--text-muted);">${info.phim || ''}</p>
        <p class="text-muted" style="margin-bottom:16px; font-family:monospace; letter-spacing:0.1em; color:var(--secondary)">${info.code}</p>
        <div class="qr-container"><img src="${qrUrl}" alt="QR Code" style="width:220px;height:220px;border-radius:8px;"></div>
        <p style="margin-top:12px; font-size:0.75rem; color:var(--text-muted);">Xuất trình mã QR này tại quầy soát vé</p>
        <button class="btn btn-outline" style="margin-top:12px;" onclick="this.closest('div[style]').parentElement.remove()">Đóng</button>
      </div>`;
      document.body.appendChild(modal);
    }

    loadHistory();
  </script>
</body>
</html>
