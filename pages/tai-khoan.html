<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tài Khoản - CineTicket</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
</head>
<body>
  <nav id="navbar"></nav>
  <main class="page">
    <div class="container" style="max-width:600px;">
      <h1 class="page-title">👤 Tài Khoản Của Tôi</h1>
      <div class="card" style="padding:30px; margin-top:24px;">
        <div id="profileInfo"></div>
        <div class="divider"></div>
        <form onsubmit="updateProfile(event)">
          <div class="form-group">
            <label class="form-label">Họ và tên</label>
            <input type="text" class="form-input" id="hoTen" required>
          </div>
          <div class="form-group">
            <label class="form-label">Số điện thoại</label>
            <input type="tel" class="form-input" id="sdt">
          </div>
          <button type="submit" class="btn btn-primary btn-full">Cập nhật</button>
        </form>
      </div>
      <button class="btn btn-outline btn-full" style="margin-top:16px;" onclick="Auth.logout()">🚪 Đăng xuất</button>
    </div>
  </main>
  <footer id="footer"></footer>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    if (!Auth.requireLogin()) throw 'err';
    const user = Auth.getUser();
    document.getElementById('profileInfo').innerHTML = `
      <div style="text-align:center; margin-bottom:20px;">
        <div style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--gold));display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 12px;">
          ${user.ho_ten.charAt(0).toUpperCase()}
        </div>
        <h2>${user.ho_ten}</h2>
        <p class="text-muted">${user.email}</p>
        <div style="margin-top:12px;display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:rgba(245,166,35,0.15);border-radius:20px;">
          <span style="color:var(--gold);font-weight:700;">⭐ ${user.diem_thuong} điểm</span>
        </div>
      </div>
    `;
    document.getElementById('hoTen').value = user.ho_ten;
    document.getElementById('sdt').value = user.so_dien_thoai || '';

    async function updateProfile(e) {
      e.preventDefault();
      const { error } = await db.from('nguoi_dung').update({
        ho_ten: document.getElementById('hoTen').value,
        so_dien_thoai: document.getElementById('sdt').value
      }).eq('id', user.id);
      if (error) { showToast('Lỗi cập nhật', 'error'); return; }
      user.ho_ten = document.getElementById('hoTen').value;
      user.so_dien_thoai = document.getElementById('sdt').value;
      localStorage.setItem('currentUser', JSON.stringify(user));
      showToast('Cập nhật thành công!', 'success');
    }
  </script>
</body>
</html>
