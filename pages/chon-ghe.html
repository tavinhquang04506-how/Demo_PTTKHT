<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chọn Ghế - CineTicket</title>
  <link rel="stylesheet" href="../css/style.css">`n  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
</head>
<body>
  <nav id="navbar"></nav>
  <main class="page">
    <div class="container">
      <div class="steps">
        <span class="step done">1<span class="step-label">Chọn phim</span></span><span class="step-line done"></span>
        <span class="step active">2<span class="step-label">Chọn ghế</span></span><span class="step-line"></span>
        <span class="step">3<span class="step-label">Bắp nước</span></span><span class="step-line"></span>
        <span class="step">4<span class="step-label">Thanh toán</span></span>
      </div>
      <div class="page-header" style="display:flex; align-items:center; gap:12px; margin-bottom: 24px;">
        <a href="javascript:history.back()" class="btn-back" title="Quay lại">←</a>
        <div>
          <h1 class="page-title" style="margin:0;">🪑 Chọn Ghế Ngồi</h1>
          <p id="showtimeInfo" class="page-subtitle" style="margin:4px 0 0;"></p>
        </div>
      </div>

      <div class="booking-layout">
        <div>
          <div class="seat-map-container" id="seatMapContainer">
            <div class="screen">MÀN HÌNH</div>
            <div class="seat-map-zoom" id="seatMapZoom">
              <div id="seatMap"></div>
            </div>
            <div class="seat-zoom-controls">
              <button class="zoom-btn" onclick="zoomSeatMap(-0.15)" title="Thu nhỏ">−</button>
              <button class="zoom-btn" onclick="resetZoom()" title="Reset" style="font-size:0.7rem;">↺</button>
              <button class="zoom-btn" onclick="zoomSeatMap(0.15)" title="Phóng to">+</button>
            </div>
            <div class="seat-legend">
              <div class="legend-item"><div class="legend-color" style="background:var(--seat-empty)"></div> Thường</div>
              <div class="legend-item"><div class="legend-color" style="background:var(--seat-vip)"></div> ⭐ VIP</div>
              <div class="legend-item"><div class="legend-color" style="background:var(--seat-couple)"></div> 💗 Đôi</div>
              <div class="legend-item"><div class="legend-color" style="background:var(--seat-selected)"></div> Đang chọn</div>
              <div class="legend-item"><div class="legend-color" style="background:var(--seat-sold);opacity:0.3"></div> ✕ Đã bán</div>
            </div>
          </div>
        </div>

        <div class="booking-sidebar">
          <h3 style="margin-bottom: 16px;">📋 Tóm tắt</h3>
          <div id="movieSummary"></div>
          <div class="divider"></div>
          <div id="selectedSeats"><p class="text-muted">Chưa chọn ghế nào</p></div>
          <div class="divider"></div>
          <div class="summary-row"><span class="summary-label">Tổng thanh toán</span><span id="totalPrice" class="summary-total">0đ</span></div>
          <button class="btn btn-primary btn-full btn-lg" style="margin-top: 20px;" id="continueBtn" disabled onclick="goToCombo()">Tiếp tục → Chọn bắp nước</button>
          <div class="summary-note">ℹ️ Vui lòng kiểm tra lại thông tin trước khi tiếp tục. Vé đã mua không thể hoàn trả.</div>
        </div>
      </div>
    </div>
  </main>
  <footer id="footer"></footer>

  <!-- Popup Modal -->
  <div class="seat-modal-overlay" id="seatModalOverlay">
    <div class="seat-modal">
      <span class="seat-modal-icon" id="seatModalIcon">⚠️</span>
      <h3 id="seatModalTitle">Thông báo</h3>
      <p id="seatModalMessage">Nội dung thông báo</p>
      <button class="btn btn-primary" id="seatModalBtn">Đã hiểu</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    if (!Auth.requireLogin()) throw 'Not logged in';
    const suatId = new URLSearchParams(window.location.search).get('suat');
    if (!suatId) { window.location.href = '/'; throw 'No showtime'; }

    let seats = [];
    let selectedSeats = [];
    let soldSeatIds = [];
    let suatChieu = null;

    // ===== MODAL POPUP FUNCTIONS =====
    function showSeatModal(icon, title, message, btnText, btnAction) {
      document.getElementById('seatModalIcon').textContent = icon;
      document.getElementById('seatModalTitle').textContent = title;
      document.getElementById('seatModalMessage').textContent = message;
      const btn = document.getElementById('seatModalBtn');
      btn.textContent = btnText || 'Đã hiểu';
      btn.onclick = () => {
        closeSeatModal();
        if (btnAction) btnAction();
      };
      document.getElementById('seatModalOverlay').classList.add('active');
    }

    function closeSeatModal() {
      document.getElementById('seatModalOverlay').classList.remove('active');
    }

    // Close modal on overlay click
    document.getElementById('seatModalOverlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeSeatModal();
    });

    // ===== DATA LOADING =====
    async function loadData() {
      // Cleanup expired reservations first
      await cleanupExpiredReservations();

      // Load showtime info
      const { data: suat } = await db
        .from('suat_chieu')
        .select('*, phim(*), phong_chieu(*, rap(*))')
        .eq('id', suatId)
        .single();

      if (!suat) { window.location.href = '/'; return; }
      suatChieu = suat;

      document.getElementById('showtimeInfo').textContent =
        `${suat.phim.ten_phim} · ${FORMAT_GIO(suat.gio_bat_dau)} · ${suat.phong_chieu.rap.ten_rap} · ${suat.phong_chieu.ten_phong}`;

      document.getElementById('movieSummary').innerHTML = `
        <p><strong>${suat.phim.ten_phim}</strong></p>
        <p class="text-muted" style="font-size:0.85rem;">${suat.phong_chieu.rap.ten_rap} - ${suat.phong_chieu.ten_phong}</p>
        <p class="text-muted" style="font-size:0.85rem;">${FORMAT_NGAY(suat.ngay_chieu)} · ${FORMAT_GIO(suat.gio_bat_dau)}</p>
        <p style="color:var(--gold); font-size:0.9rem;">Giá vé cơ bản: ${FORMAT_TIEN(suat.gia_ve)}</p>
      `;

      // Load seats
      const { data: seatData } = await db
        .from('ghe')
        .select('*')
        .eq('phong_chieu_id', suat.phong_chieu_id)
        .order('hang_ghe').order('so_ghe');
      seats = seatData || [];

      // Load sold + reserved seats (both da_thanh_toan and cho_thanh_toan)
      const { data: soldData } = await db
        .from('chi_tiet_ve')
        .select('ghe_id, dat_ve!inner(suat_chieu_id, trang_thai)')
        .eq('dat_ve.suat_chieu_id', parseInt(suatId))
        .in('dat_ve.trang_thai', ['da_thanh_toan', 'cho_thanh_toan']);

      soldSeatIds = (soldData || []).map(d => d.ghe_id);

      renderSeatMap();
      if (typeof autoFitSeatMap === 'function') autoFitSeatMap();
    }

    function renderSeatMap() {
      const map = document.getElementById('seatMap');
      const rows = {};
      seats.forEach(s => {
        if (!rows[s.hang_ghe]) rows[s.hang_ghe] = [];
        rows[s.hang_ghe].push(s);
      });

      let html = '';
      Object.keys(rows).sort().forEach(row => {
        const rowSeats = rows[row].sort((a,b) => a.so_ghe - b.so_ghe);
        html += `<div class="seat-row"><span class="seat-row-label">${row}</span>`;
        rowSeats.forEach(s => {
          const isSold = soldSeatIds.includes(s.id);
          const isSelected = selectedSeats.some(ss => ss.id === s.id);
          const typeClass = s.loai_ghe === 'vip' ? 'vip-seat' : s.loai_ghe === 'doi' ? 'couple-seat' : '';
          const seatClass = isSold ? 'seat-sold' : isSelected ? 'seat-selected selected' : `seat-${s.loai_ghe}`;
          const width = s.loai_ghe === 'doi' ? 'seat-doi' : '';
          html += `<button class="seat ${seatClass} ${width} ${typeClass}" 
            ${isSold ? 'disabled' : `onclick="toggleSeat(${s.id})"`}
            title="${s.hang_ghe}${s.so_ghe} - ${LOAI_GHE[s.loai_ghe].ten}">${s.hang_ghe}${s.so_ghe}</button>`;
        });
        html += `<span class="seat-row-label">${row}</span></div>`;
      });
      map.innerHTML = html;
    }

    // ===== TOGGLE SEAT (async with DB conflict check) =====
    let isToggling = false; // Prevent double-click issues

    async function toggleSeat(seatId) {
      if (isToggling) return;
      isToggling = true;

      try {
        const seat = seats.find(s => s.id === seatId);
        if (!seat) return;

        const idx = selectedSeats.findIndex(s => s.id === seatId);
        if (idx >= 0) {
          // Deselecting - always allowed
          selectedSeats.splice(idx, 1);
        } else {
          // Selecting - check limits
          if (selectedSeats.length >= 8) { showToast('Tối đa 8 ghế', 'error'); return; }

          // Real-time DB check: is this seat still available?
          const { data: conflictData } = await db
            .from('chi_tiet_ve')
            .select('ghe_id, dat_ve!inner(suat_chieu_id, trang_thai)')
            .eq('ghe_id', seatId)
            .eq('dat_ve.suat_chieu_id', parseInt(suatId))
            .in('dat_ve.trang_thai', ['da_thanh_toan', 'cho_thanh_toan']);

          if (conflictData && conflictData.length > 0) {
            // Seat was taken by someone else since page loaded
            soldSeatIds.push(seatId);
            renderSeatMap();
            showSeatModal(
              '🚫',
              'Ghế đã được đặt',
              'Ghế ' + seat.hang_ghe + seat.so_ghe + ' đã được người khác chọn! Vui lòng tải lại trang để cập nhật sơ đồ ghế mới nhất.',
              'Tải lại trang',
              () => window.location.reload()
            );
            return;
          }

          // Temporarily add seat to check for gap
          selectedSeats.push(seat);

          // Check single seat gap
          if (hasSingleSeatGap()) {
            // Revert - remove the seat we just added
            selectedSeats.pop();
            showSeatModal(
              '⚠️',
              'Không thể chọn ghế này',
              'Bạn không được bỏ trống 1 ghế lẻ bên cạnh! Vui lòng chọn ghế liền kề hoặc chọn ghế khác.',
              'Đã hiểu'
            );
            return;
          }
        }

        renderSeatMap();
        updateSummary();
      } finally {
        isToggling = false;
      }
    }

    // ===== SINGLE SEAT GAP DETECTION (returns boolean, no side effects) =====
    function hasSingleSeatGap() {
      const rows = {};
      seats.forEach(s => {
        if (!rows[s.hang_ghe]) rows[s.hang_ghe] = [];
        rows[s.hang_ghe].push(s);
      });

      let hasGap = false;
      Object.keys(rows).forEach(row => {
        if (hasGap) return;
        const rowSeats = rows[row].sort((a,b) => a.so_ghe - b.so_ghe);
        for (let i = 0; i < rowSeats.length; i++) {
          const s = rowSeats[i];
          // Skip if this seat is sold, selected, or couple (couple seats are exempt from gap rule)
          if (soldSeatIds.includes(s.id) || selectedSeats.some(ss => ss.id === s.id) || s.loai_ghe === 'doi') continue;
          // This seat is EMPTY - check if it would be isolated
          const prev = rowSeats[i - 1];
          const next = rowSeats[i + 1];
          const prevOccupied = prev && (soldSeatIds.includes(prev.id) || selectedSeats.some(ss => ss.id === prev.id));
          const nextOccupied = next && (soldSeatIds.includes(next.id) || selectedSeats.some(ss => ss.id === next.id));
          // Edge = first or last seat in the row (wall)
          const isLeftEdge = !prev;
          const isRightEdge = !next;
          // Block if: sandwiched between occupied, OR wall+occupied on either side
          if ((prevOccupied && nextOccupied) || (isLeftEdge && nextOccupied) || (isRightEdge && prevOccupied)) {
            hasGap = true;
            break;
          }
        }
      });

      return hasGap;
    }

    function updateSummary() {
      const container = document.getElementById('selectedSeats');
      const btn = document.getElementById('continueBtn');
      if (!selectedSeats.length) {
        container.innerHTML = '<p class="text-muted">Chưa chọn ghế nào</p>';
        document.getElementById('totalPrice').textContent = '0đ';
        btn.disabled = true;
        return;
      }
      let total = 0;
      container.innerHTML = selectedSeats.map(s => {
        const price = suatChieu.gia_ve + s.gia_them;
        total += price;
        return `<div class="summary-row">
          <span>${s.hang_ghe}${s.so_ghe} <span class="tag">${LOAI_GHE[s.loai_ghe].ten}</span></span>
          <span>${FORMAT_TIEN(price)}</span>
        </div>`;
      }).join('');
      document.getElementById('totalPrice').textContent = FORMAT_TIEN(total);
      btn.disabled = false;
    }

    // ===== GO TO COMBO (creates reservation in DB) =====
    async function goToCombo() {
      const btn = document.getElementById('continueBtn');
      btn.disabled = true;
      btn.textContent = 'Đang xử lý...';

      try {
        const user = Auth.getUser();
        const total = selectedSeats.reduce((sum, s) => sum + suatChieu.gia_ve + s.gia_them, 0);

        // Final conflict check before reserving
        const { data: finalConflicts } = await db
          .from('chi_tiet_ve')
          .select('ghe_id, dat_ve!inner(suat_chieu_id, trang_thai)')
          .in('ghe_id', selectedSeats.map(s => s.id))
          .eq('dat_ve.suat_chieu_id', parseInt(suatId))
          .in('dat_ve.trang_thai', ['da_thanh_toan', 'cho_thanh_toan']);

        if (finalConflicts && finalConflicts.length > 0) {
          showToast('Một số ghế đã được người khác đặt. Đang tải lại...', 'error');
          setTimeout(() => window.location.reload(), 1500);
          return;
        }

        // Create reservation (dat_ve with cho_thanh_toan status)
        const maDatVe = taoMaDatVe();
        const { data: dv, error: dvErr } = await db.from('dat_ve').insert({
          ma_dat_ve: maDatVe,
          nguoi_dung_id: user.id,
          suat_chieu_id: parseInt(suatId),
          tong_tien_ghe: total,
          tong_tien: total,
          trang_thai: 'cho_thanh_toan'
        }).select().single();

        if (dvErr) throw dvErr;

        // Create chi_tiet_ve records for locked seats
        const seatInserts = selectedSeats.map(s => ({
          dat_ve_id: dv.id,
          ghe_id: s.id,
          gia_ve: suatChieu.gia_ve + s.gia_them
        }));
        const { error: seatErr } = await db.from('chi_tiet_ve').insert(seatInserts);
        if (seatErr) throw seatErr;

        // Save to BookingStore
        BookingStore.save({
          suatChieuId: parseInt(suatId),
          datVeId: dv.id,
          maDatVe: maDatVe,
          gheIds: selectedSeats.map(s => s.id),
          gheLabels: selectedSeats.map(s => `${s.hang_ghe}${s.so_ghe}`),
          gheTypes: selectedSeats.map(s => s.loai_ghe),
          tongTienGhe: total,
          phimTen: suatChieu.phim.ten_phim,
          rapTen: suatChieu.phong_chieu.rap.ten_rap,
          phongTen: suatChieu.phong_chieu.ten_phong,
          ngayChieu: suatChieu.ngay_chieu,
          gioBatDau: suatChieu.gio_bat_dau,
          giaVe: suatChieu.gia_ve
        });

        window.location.href = '/pages/bap-nuoc';
      } catch (err) {
        console.error('Reservation error:', err);
        showToast('Lỗi đặt ghế: ' + (err.message || 'Không xác định'), 'error');
        btn.disabled = false;
        btn.textContent = 'Tiếp tục → Chọn bắp nước';
      }
    }

    loadData();

    // ===== PINCH TO ZOOM & PAN =====
    let scale = 1, posX = 0, posY = 0;
    let initScale = 1;
    const MIN_SCALE = 0.5, MAX_SCALE = 2.5;
    const zoomEl = () => document.getElementById('seatMapZoom');

    function applyTransform(smooth) {
      const el = zoomEl();
      if (!el) return;
      // Enable/disable smooth transition
      el.style.transition = smooth ? 'transform 0.35s cubic-bezier(0.25, 0.1, 0.25, 1)' : 'none';
      el.style.transform = `scale(${scale}) translate(${posX}px, ${posY}px)`;
    }

    function zoomSeatMap(delta) {
      scale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale + delta));
      if (scale <= initScale + 0.05) { posX = 0; posY = 0; }
      applyTransform(true);
      adjustContainerHeight();
    }

    function calcFitScale() {
      const map = document.getElementById('seatMap');
      const ctn = document.getElementById('seatMapContainer');
      if (!map || !ctn) return 0.9;
      // Temporarily reset to measure natural width
      const el = zoomEl();
      const prevT = el ? el.style.transform : '';
      if (el) { el.style.transition = 'none'; el.style.transform = 'none'; }
      const mapW = map.scrollWidth;
      if (el) el.style.transform = prevT;
      const ctnW = ctn.clientWidth;
      if (mapW <= 0) return 0.9;
      return Math.min(1, ctnW / mapW);
    }

    function resetZoom() {
      scale = window.innerWidth <= 768 ? calcFitScale() : 1;
      posX = 0; posY = 0;
      applyTransform(true);
      adjustContainerHeight();
    }

    function adjustContainerHeight() {
      const el = zoomEl();
      if (el && scale < 1) {
        el.parentElement.style.height = (el.scrollHeight * scale + 20) + 'px';
      } else if (el) {
        el.parentElement.style.height = '';
      }
    }

    function autoFitSeatMap() {
      if (window.innerWidth <= 768) {
        setTimeout(() => {
          initScale = calcFitScale();
          scale = initScale;
          posX = 0; posY = 0;
          applyTransform(false);
          adjustContainerHeight();
          // Re-enable smooth for subsequent interactions
          setTimeout(() => applyTransform(true), 50);
        }, 400);
      }
    }

    // ===== TOUCH GESTURES =====
    (function() {
      const container = document.getElementById('seatMapContainer');
      if (!container) return;
      let lastDist = 0, lastX = 0, lastY = 0, isPinching = false, isDragging = false;

      container.addEventListener('touchstart', function(e) {
        if (e.touches.length === 2) {
          e.preventDefault();
          isPinching = true;
          lastDist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
          );
        } else if (e.touches.length === 1 && scale > initScale + 0.1) {
          isDragging = true;
          lastX = e.touches[0].clientX - posX;
          lastY = e.touches[0].clientY - posY;
        }
      }, { passive: false });

      container.addEventListener('touchmove', function(e) {
        if (e.touches.length === 2 && isPinching) {
          e.preventDefault();
          const dist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
          );
          const delta = (dist - lastDist) * 0.008;
          scale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale + delta));
          lastDist = dist;
          if (scale <= initScale + 0.05) { posX = 0; posY = 0; }
          applyTransform(false); // No transition during pinch for real-time feel
          adjustContainerHeight();
        } else if (e.touches.length === 1 && isDragging && scale > initScale + 0.1) {
          e.preventDefault();
          posX = e.touches[0].clientX - lastX;
          posY = e.touches[0].clientY - lastY;
          applyTransform(false);
        }
      }, { passive: false });

      container.addEventListener('touchend', function(e) {
        if (isPinching && e.touches.length < 2) {
          isPinching = false;
          // Snap back if zoomed out too much
          if (scale < initScale) { scale = initScale; posX = 0; posY = 0; applyTransform(true); }
          adjustContainerHeight();
        }
        if (e.touches.length === 0) { isDragging = false; }
      });
    })();
  </script>
</body>
</html>
