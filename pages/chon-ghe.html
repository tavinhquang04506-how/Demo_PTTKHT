<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chọn Ghế - CineTicket</title>
  <link rel="stylesheet" href="../css/style.css">`n  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
</head>
<body>
  <nav id="navbar"></nav>
  <main class="page">
    <div class="container">
      <div class="steps">
        <span class="step done">1<span class="step-label">Chọn phim</span></span><span class="step-line done"></span>
        <span class="step active">2<span class="step-label">Chọn ghế</span></span><span class="step-line"></span>
        <span class="step">3<span class="step-label">Bắp nước</span></span><span class="step-line"></span>
        <span class="step">4<span class="step-label">Thanh toán</span></span>
      </div>
      <div class="page-header" style="display:flex; align-items:center; gap:12px; margin-bottom: 24px;">
        <a href="javascript:history.back()" class="btn-back" title="Quay lại">←</a>
        <div>
          <h1 class="page-title" style="margin:0;">🪑 Chọn Ghế Ngồi</h1>
          <p id="showtimeInfo" class="page-subtitle" style="margin:4px 0 0;"></p>
        </div>
      </div>

      <div class="booking-layout">
        <div>
          <div class="seat-map-container" id="seatMapContainer">
            <div class="screen">MÀN HÌNH</div>
            <div class="seat-map-zoom" id="seatMapZoom">
              <div id="seatMap"></div>
            </div>
            <div class="seat-zoom-controls">
              <button class="zoom-btn" onclick="zoomSeatMap(-0.15)" title="Thu nhỏ">−</button>
              <button class="zoom-btn" onclick="resetZoom()" title="Reset" style="font-size:0.7rem;">↺</button>
              <button class="zoom-btn" onclick="zoomSeatMap(0.15)" title="Phóng to">+</button>
            </div>
            <div class="seat-legend">
              <div class="legend-item"><div class="legend-color" style="background:var(--seat-empty)"></div> Thường</div>
              <div class="legend-item"><div class="legend-color" style="background:var(--seat-vip)"></div> ⭐ VIP</div>
              <div class="legend-item"><div class="legend-color" style="background:var(--seat-couple)"></div> 💗 Đôi</div>
              <div class="legend-item"><div class="legend-color" style="background:var(--seat-selected)"></div> Đang chọn</div>
              <div class="legend-item"><div class="legend-color" style="background:var(--seat-sold);opacity:0.3"></div> ✕ Đã bán</div>
            </div>
          </div>
        </div>

        <div class="booking-sidebar">
          <h3 style="margin-bottom: 16px;">📋 Tóm tắt</h3>
          <div id="movieSummary"></div>
          <div class="divider"></div>
          <div id="selectedSeats"><p class="text-muted">Chưa chọn ghế nào</p></div>
          <div class="divider"></div>
          <div class="summary-row"><span class="summary-label">Tổng thanh toán</span><span id="totalPrice" class="summary-total">0đ</span></div>
          <button class="btn btn-primary btn-full btn-lg" style="margin-top: 20px;" id="continueBtn" disabled onclick="goToCombo()">Tiếp tục → Chọn bắp nước</button>
          <div class="summary-note">ℹ️ Vui lòng kiểm tra lại thông tin trước khi tiếp tục. Vé đã mua không thể hoàn trả.</div>
        </div>
      </div>
    </div>
  </main>
  <footer id="footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    if (!Auth.requireLogin()) throw 'Not logged in';
    const suatId = new URLSearchParams(window.location.search).get('suat');
    if (!suatId) { window.location.href = '/'; throw 'No showtime'; }

    let seats = [];
    let selectedSeats = [];
    let soldSeatIds = [];
    let suatChieu = null;

    async function loadData() {
      // Load showtime info
      const { data: suat } = await db
        .from('suat_chieu')
        .select('*, phim(*), phong_chieu(*, rap(*))')
        .eq('id', suatId)
        .single();

      if (!suat) { window.location.href = '/'; return; }
      suatChieu = suat;

      document.getElementById('showtimeInfo').textContent =
        `${suat.phim.ten_phim} · ${FORMAT_GIO(suat.gio_bat_dau)} · ${suat.phong_chieu.rap.ten_rap} · ${suat.phong_chieu.ten_phong}`;

      document.getElementById('movieSummary').innerHTML = `
        <p><strong>${suat.phim.ten_phim}</strong></p>
        <p class="text-muted" style="font-size:0.85rem;">${suat.phong_chieu.rap.ten_rap} - ${suat.phong_chieu.ten_phong}</p>
        <p class="text-muted" style="font-size:0.85rem;">${FORMAT_NGAY(suat.ngay_chieu)} · ${FORMAT_GIO(suat.gio_bat_dau)}</p>
        <p style="color:var(--gold); font-size:0.9rem;">Giá vé cơ bản: ${FORMAT_TIEN(suat.gia_ve)}</p>
      `;

      // Load seats
      const { data: seatData } = await db
        .from('ghe')
        .select('*')
        .eq('phong_chieu_id', suat.phong_chieu_id)
        .order('hang_ghe').order('so_ghe');
      seats = seatData || [];

      // Load sold seats
      const { data: soldData } = await db
        .from('chi_tiet_ve')
        .select('ghe_id, dat_ve(suat_chieu_id, trang_thai)')
        .in('dat_ve.trang_thai', ['da_thanh_toan', 'cho_thanh_toan']);

      soldSeatIds = (soldData || [])
        .filter(d => d.dat_ve && d.dat_ve.suat_chieu_id === parseInt(suatId))
        .map(d => d.ghe_id);

      renderSeatMap();
      if (typeof autoFitSeatMap === 'function') autoFitSeatMap();
    }

    function renderSeatMap() {
      const map = document.getElementById('seatMap');
      const rows = {};
      seats.forEach(s => {
        if (!rows[s.hang_ghe]) rows[s.hang_ghe] = [];
        rows[s.hang_ghe].push(s);
      });

      let html = '';
      Object.keys(rows).sort().forEach(row => {
        const rowSeats = rows[row].sort((a,b) => a.so_ghe - b.so_ghe);
        html += `<div class="seat-row"><span class="seat-row-label">${row}</span>`;
        rowSeats.forEach(s => {
          const isSold = soldSeatIds.includes(s.id);
          const isSelected = selectedSeats.some(ss => ss.id === s.id);
          const seatClass = isSold ? 'seat-sold' : isSelected ? 'seat-selected' : `seat-${s.loai_ghe}`;
          const width = s.loai_ghe === 'doi' ? 'seat-doi' : '';
          html += `<button class="seat ${seatClass} ${width}" 
            ${isSold ? 'disabled' : `onclick="toggleSeat(${s.id})"`}
            title="${s.hang_ghe}${s.so_ghe} - ${LOAI_GHE[s.loai_ghe].ten}">${s.hang_ghe}${s.so_ghe}</button>`;
        });
        html += `<span class="seat-row-label">${row}</span></div>`;
      });
      map.innerHTML = html;
    }

    function toggleSeat(seatId) {
      const seat = seats.find(s => s.id === seatId);
      if (!seat) return;
      const idx = selectedSeats.findIndex(s => s.id === seatId);
      if (idx >= 0) {
        selectedSeats.splice(idx, 1);
      } else {
        if (selectedSeats.length >= 8) { showToast('Tối đa 8 ghế', 'error'); return; }
        selectedSeats.push(seat);
      }
      renderSeatMap();
      updateSummary();
    }

    function updateSummary() {
      const container = document.getElementById('selectedSeats');
      const btn = document.getElementById('continueBtn');
      if (!selectedSeats.length) {
        container.innerHTML = '<p class="text-muted">Chưa chọn ghế nào</p>';
        document.getElementById('totalPrice').textContent = '0đ';
        btn.disabled = true;
        return;
      }
      let total = 0;
      container.innerHTML = selectedSeats.map(s => {
        const price = suatChieu.gia_ve + s.gia_them;
        total += price;
        return `<div class="summary-row">
          <span>${s.hang_ghe}${s.so_ghe} <span class="tag">${LOAI_GHE[s.loai_ghe].ten}</span></span>
          <span>${FORMAT_TIEN(price)}</span>
        </div>`;
      }).join('');
      document.getElementById('totalPrice').textContent = FORMAT_TIEN(total);
      btn.disabled = false;
    }

    function goToCombo() {
      const total = selectedSeats.reduce((sum, s) => sum + suatChieu.gia_ve + s.gia_them, 0);
      BookingStore.save({
        suatChieuId: parseInt(suatId),
        gheIds: selectedSeats.map(s => s.id),
        gheLabels: selectedSeats.map(s => `${s.hang_ghe}${s.so_ghe}`),
        gheTypes: selectedSeats.map(s => s.loai_ghe),
        tongTienGhe: total,
        phimTen: suatChieu.phim.ten_phim,
        rapTen: suatChieu.phong_chieu.rap.ten_rap,
        phongTen: suatChieu.phong_chieu.ten_phong,
        ngayChieu: suatChieu.ngay_chieu,
        gioBatDau: suatChieu.gio_bat_dau,
        giaVe: suatChieu.gia_ve
      });
      window.location.href = '/pages/bap-nuoc';
    }

    loadData();

    // ===== PINCH TO ZOOM & PAN =====
    let scale = 1;
    let posX = 0, posY = 0;
    const MIN_SCALE = 0.35, MAX_SCALE = 2;

    function applyTransform() {
      const el = document.getElementById('seatMapZoom');
      if (el) el.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
    }

    function zoomSeatMap(delta) {
      scale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale + delta));
      if (scale <= calcFitScale() + 0.05) { posX = 0; posY = 0; }
      applyTransform();
    }

    function calcFitScale() {
      const container = document.getElementById('seatMapContainer');
      const seatMap = document.getElementById('seatMap');
      if (!container || !seatMap || !seatMap.scrollWidth) return 0.5;
      return Math.min(1, (container.clientWidth - 16) / seatMap.scrollWidth);
    }

    function resetZoom() {
      scale = window.innerWidth <= 768 ? calcFitScale() : 1;
      posX = 0; posY = 0;
      applyTransform();
    }

    // Auto-fit on mobile after seats load
    function autoFitSeatMap() {
      if (window.innerWidth <= 768) {
        setTimeout(() => {
          scale = calcFitScale();
          posX = 0; posY = 0;
          applyTransform();
        }, 400);
      }
    }

    // Touch gestures
    (function() {
      const container = document.getElementById('seatMapContainer');
      if (!container) return;
      let lastDist = 0, lastX = 0, lastY = 0, isDragging = false;

      container.addEventListener('touchstart', function(e) {
        if (e.touches.length === 2) {
          e.preventDefault();
          lastDist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
          );
        } else if (e.touches.length === 1 && scale > 0.75) {
          isDragging = true;
          lastX = e.touches[0].clientX - posX;
          lastY = e.touches[0].clientY - posY;
        }
      }, { passive: false });

      container.addEventListener('touchmove', function(e) {
        if (e.touches.length === 2) {
          e.preventDefault();
          const dist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
          );
          const delta = (dist - lastDist) * 0.005;
          scale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale + delta));
          lastDist = dist;
          if (scale <= 0.7) { posX = 0; posY = 0; }
          applyTransform();
        } else if (e.touches.length === 1 && isDragging && scale > 0.75) {
          posX = e.touches[0].clientX - lastX;
          posY = e.touches[0].clientY - lastY;
          applyTransform();
        }
      }, { passive: false });

      container.addEventListener('touchend', function() { isDragging = false; lastDist = 0; });
    })();
  </script>
</body>
</html>
