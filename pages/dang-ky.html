<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Ký - CineTicket</title>
  <link rel="stylesheet" href="../css/style.css">`n  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
</head>
<body>
  <nav id="navbar"></nav>
  <main class="page">
    <div class="container">
      <div class="auth-container">
        <h1>📝 Đăng Ký Tài Khoản</h1>
        <p class="subtitle">Tạo tài khoản để trải nghiệm đặt vé nhanh chóng</p>
        <form id="registerForm" onsubmit="handleRegister(event)">
          <div class="form-group">
            <label class="form-label">👤 Họ và tên</label>
            <input type="text" class="form-input" id="hoTen" placeholder="Nguyễn Văn A" required>
          </div>
          <div class="form-group">
            <label class="form-label">📧 Email</label>
            <input type="email" class="form-input" id="email" placeholder="your@email.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">📱 Số điện thoại</label>
            <input type="tel" class="form-input" id="sdt" placeholder="0901234567" required>
          </div>
          <div class="form-group">
            <label class="form-label">🔒 Mật khẩu</label>
            <input type="password" class="form-input" id="password" placeholder="Tối thiểu 6 ký tự" required minlength="6">
          </div>
          <button type="submit" class="btn btn-primary btn-full btn-lg" id="regBtn">Đăng ký</button>
        </form>
        <div class="auth-footer">Đã có tài khoản? <a href="/pages/dang-nhap"><strong>Đăng nhập</strong></a></div>
      </div>
    </div>
  </main>
  <footer id="footer"></footer>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    if (Auth.isLoggedIn()) window.location.href = '/';
    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('regBtn');
      btn.disabled = true; btn.textContent = 'Đang đăng ký...';
      try {
        await Auth.register(
          document.getElementById('hoTen').value,
          document.getElementById('email').value,
          document.getElementById('sdt').value,
          document.getElementById('password').value
        );
        showToast('Đăng ký thành công!', 'success');
        setTimeout(() => window.location.href = '/', 1000);
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false; btn.textContent = 'Đăng ký';
      }
    }
  </script>
</body>
</html>
